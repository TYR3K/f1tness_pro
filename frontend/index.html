<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- Вьюпорт: мобильный, поддержка безопасных зон (вырезы/«чёлки») -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Трекер калорий</title>

  <!-- Шрифт Inter из Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Основные стили приложения -->
  <link rel="stylesheet" href="css/style.css?v=s5">
</head>
<body>
  <!-- Контейнер активной страницы: App очищает и наполняет его -->
  <main id="view"></main>

  <!-- Нижняя панель навигации: пять пунктов (центральная кнопка-камера приподнята) -->
  <nav id="tabbar">
    <button class="tab" type="button" data-page="workouts">
      <span class="tab-emoji" aria-hidden="true">🏋️</span>
      <span class="tab-label">Тренировки</span>
    </button>
    <button class="tab" type="button" data-page="supplements">
      <span class="tab-emoji" aria-hidden="true">💊</span>
      <span class="tab-label">Добавки</span>
    </button>
    <!-- Центральная кнопка «Определение»: только иконка камеры в кружке, без подписи -->
    <button class="tab tab-camera" type="button" data-page="scan" aria-label="Определение">
      <svg class="tab-camera__icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#FFFDFA" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
    </button>
    <button class="tab" type="button" data-page="diary">
      <span class="tab-emoji" aria-hidden="true">🥗</span>
      <span class="tab-label">Рацион</span>
    </button>
    <button class="tab" type="button" data-page="account">
      <span class="tab-emoji" aria-hidden="true">👤</span>
      <span class="tab-label">Аккаунт</span>
    </button>
  </nav>

  <!-- Оверлей загрузки со спиннером (по умолчанию скрыт) -->
  <div id="loading" hidden>
    <div class="spinner" aria-label="Загрузка"></div>
  </div>

  <!-- Контейнер всплывающих уведомлений -->
  <div id="toast"></div>

  <!-- Скрипты в конце body, в строгом порядке согласно контракту -->
  <!-- 1) Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- 2) Ядро приложения: window.App, хелперы, API-клиент, роутер -->
  <script src="js/app.js?v=s5"></script>
  <!-- 3-7) Контроллеры страниц (каждый вызывает App.registerPage при загрузке) -->
  <script src="js/page-scan.js?v=s5"></script>
  <script src="js/page-diary.js?v=s5"></script>
  <script src="js/page-workouts.js?v=s5"></script>
  <script src="js/page-supplements.js?v=s5"></script>
  <script src="js/page-subscription.js?v=s5"></script>
  <script src="js/page-account.js?v=s5"></script>
  <!-- 6) Запуск приложения после регистрации всех страниц -->
  <script>App.init();</script>
</body>
</html>
